<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página no encontrada — LUMIÈRE</title>

    <div style="max-width:500px;">

      <div style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap;">
